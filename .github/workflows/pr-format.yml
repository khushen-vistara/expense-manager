name: PR Format

on:
  pull_request_target:
    types:
      - opened
      - edited
      - synchronize
      - reopened

jobs:
  pr-title:
    name: PR title
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read

    steps:
      - name: Validate PR title
        uses: actions/github-script@v7
        with:
          script: |
            const allowedTypes = [
              "feat",
              "fix",
              "docs",
              "style",
              "refactor",
              "perf",
              "test",
              "build",
              "ci",
              "chore",
              "revert",
            ];
            const conventionalCommit = new RegExp(
              `^(${allowedTypes.join("|")})(\\([^)]+\\))?(!)?: .+`
            );
            const title = context.payload.pull_request.title;

            if (!conventionalCommit.test(title)) {
              core.setFailed(
                [
                  `PR title does not follow Conventional Commits: "${title}"`,
                  "Expected format: type(scope): summary",
                  "Example: feat(transactions): add category filter",
                ].join("\n")
              );
            }

  pr-body:
    name: PR body
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read

    steps:
      - name: Validate PR body sections
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.pull_request.body || "";
            const requiredSections = [
              "## Summary",
              "## Changes",
              "## Testing",
              "## Screenshots",
              "## Checklist",
            ];

            const missingSections = requiredSections.filter(
              (section) => !body.includes(section)
            );

            if (missingSections.length > 0) {
              core.setFailed(
                [
                  "PR body is missing required sections:",
                  ...missingSections.map((section) => `- ${section}`),
                ].join("\n")
              );
            }
