name: Commit Convention

on:
  pull_request_target:
    types:
      - opened
      - edited
      - synchronize
      - reopened

jobs:
  commit-messages:
    name: commit messages
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Validate commit messages
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pull_number = context.payload.pull_request.number;
            const allowedTypes = [
              "feat",
              "fix",
              "docs",
              "style",
              "refactor",
              "perf",
              "test",
              "build",
              "ci",
              "chore",
              "revert",
            ];
            const conventionalCommit = new RegExp(
              `^(${allowedTypes.join("|")})(\\([^)]+\\))?(!)?: .+`
            );

            const commits = await github.paginate(github.rest.pulls.listCommits, {
              owner,
              repo,
              pull_number,
              per_page: 100,
            });

            const invalid = commits
              .map((commit) => commit.commit.message.split("\n")[0])
              .filter((message) => !conventionalCommit.test(message));

            if (invalid.length > 0) {
              core.setFailed(
                [
                  "These commit messages do not follow Conventional Commits:",
                  ...invalid.map((message) => `- ${message}`),
                  "",
                  "Expected format: type(scope): summary",
                  "Example: feat(transactions): add category filter",
                ].join("\n")
              );
            }
